<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenSky Flight Radar Backend</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1419;
      color: #eef5f1;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(640px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid #31404a;
      border-radius: 8px;
      background: #17202a;
    }

    code {
      color: #36d1b7;
    }
  </style>
</head>
<body>
  <main>
    <h1>Backend OpenSky aktif</h1>
    <p>Frontend sekarang berada di folder <code>frontend</code>.</p>
    <p>Untuk mode development, jalankan <code>npm.cmd run dev</code> dari folder <code>frontend</code>.</p>
    <p>Untuk melayani frontend dari Django, jalankan <code>npm.cmd run build</code> lalu buka ulang root backend ini.</p>
  </main>
</body>
</html>

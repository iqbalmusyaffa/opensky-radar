<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Radar</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f7fa;
        }

        .container{
            width:90%;
            max-width:1300px;
            margin:30px auto;
        }

        .header{
            background:#2563eb;
            color:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .header h1{
            margin-bottom:5px;
        }

        .info{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        .card{
            flex:1;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        thead{
            background:#2563eb;
            color:white;
        }

        th,
        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tbody tr:hover{
            background:#f1f5f9;
        }

        button{
            background:#22c55e;
            color:white;
            border:none;
            padding:8px 15px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#16a34a;
        }

        .connected{
            color:green;
            font-weight:bold;
        }

        .disconnected{
            color:red;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>✈ Virtual Radar</h1>
        <p>Real-Time Aircraft Tracking using OpenSky Network</p>
    </div>

    <div class="info">

        <div class="card">
            <h3>Status</h3>
            <p id="status">Connecting...</p>
        </div>

        <div class="card">
            <h3>Aircraft</h3>
            <p id="count">0</p>
        </div>

        <div class="card">
            <h3>Last Update</h3>
            <p id="time">-</p>
        </div>

    </div>

    <table>

        <thead>
            <tr>
                <th>ICAO24</th>
                <th>Callsign</th>
                <th>Country</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Altitude</th>
                <th>Speed</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="aircraft-table">
            <tr>
                <td colspan="8">
                    Waiting data...
                </td>
            </tr>
        </tbody>

    </table>

</div>

<script>

const statusElement = document.getElementById("status");
const countElement = document.getElementById("count");
const timeElement = document.getElementById("time");
const table = document.getElementById("aircraft-table");

const socket = new WebSocket("ws://127.0.0.1:8000/ws/radar/");

socket.onopen = function () {

    statusElement.innerHTML =
        "<span class='connected'>🟢 Connected</span>";

};

socket.onclose = function () {

    statusElement.innerHTML =
        "<span class='disconnected'>🔴 Disconnected</span>";

};

socket.onerror = function () {

    statusElement.innerHTML =
        "<span class='disconnected'>⚠ Error</span>";

};

socket.onmessage = function(event){

    console.log("RAW:", event.data);

    const response = JSON.parse(event.data);

    console.log(response);

    if(response.type === "error"){
        console.error(response.message);
        return;
    }

    if(response.type !== "radar_update"){
        return;
    }

    const aircraft = response.aircraft;

    countElement.textContent = aircraft.length;

    timeElement.textContent =
        new Date().toLocaleTimeString();

    table.innerHTML = "";

    if(aircraft.length === 0){

        table.innerHTML = `
            <tr>
                <td colspan="8">
                    No aircraft found.
                </td>
            </tr>
        `;

        return;
    }

    aircraft.forEach((item) => {

        const latitude =
            typeof item.latitude === "number"
                ? item.latitude.toFixed(4)
                : "-";

        const longitude =
            typeof item.longitude === "number"
                ? item.longitude.toFixed(4)
                : "-";

        const altitude =
            item.baro_altitude ?? "-";

        const speed =
            item.velocity ?? "-";

        table.innerHTML += `
            <tr>

                <td>${item.icao24}</td>

                <td>${item.callsign ?? "-"}</td>

                <td>${item.origin_country}</td>

                <td>${latitude}</td>

                <td>${longitude}</td>

                <td>${altitude}</td>

                <td>${speed}</td>

                <td>
                    <button onclick="followAircraft('${item.icao24}')">
                        Follow
                    </button>
                </td>

            </tr>
        `;

    });

};

function followAircraft(icao24){

    alert("Follow Aircraft : " + icao24);

}

</script>

</body>
</html>
